<!DOCTYPE html>
<html>
    
<head>
    <style>
body {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items:  center;
    min-height: 100vh;
    margin: 0px;
}

button {
    font-stretch: semi-expanded;
    font-size: 30px;
    height: 90px;
    width: 110px;
    padding: 5px;
    border-radius: 5px;
    box-shadow: none;
    border: 1px solid black;
}
    </style>
</head>
<body id="body">
    <div class="button-parent">
        <button onclick="onColorChange()">Click</button>
    </div>
    <script>


        function randomHexValueGenerator(){
            let randHex = '#' + Math.floor(Math.random() * 0xFFFFFF)
            .toString(16)
            .padStart(6,0)

            return randHex
        }

        function onColorChange(){
            let body = document.getElementById('body')
            newColor = randomHexValueGenerator()
            body.style.backgroundColor = newColor
        }


    </script>
</body>
</html>
